name: KF CPTEC Content Factory Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      sku_id:
        description: 'SKU ID to process (empty = batch)'
        required: false
        default: ''
      live:
        description: 'Use live API calls'
        type: boolean
        default: false

env:
  PYTHON_VERSION: '3.11'

jobs:
  test:
    name: Validate & Test Pipeline
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify imports
        run: |
          python -c "
          import config
          from pipeline.schemas.sku_schema import SKUCanonical
          from pipeline.schemas.blog_schema import BlogStructure
          from pipeline.schemas.seo_schema import SEOKeywords
          from pipeline.schemas.video_schema import VideoLinks
          from pipeline.utils.validator import validate_assembly
          from pipeline.core.state_machine import SKUStateMachine
          print('All imports OK')
          "

      - name: Generate sample output
        run: |
          python main.py sample

      - name: Validate sample output schema
        run: |
          python -c "
          import json
          from pathlib import Path
          from pipeline.utils.validator import validate_assembly

          output_dir = Path('pipeline/output')
          for sku_dir in output_dir.iterdir():
              if sku_dir.is_dir() and sku_dir.name != '_yt_cache':
                  master_file = sku_dir / 'master.json'
                  if master_file.exists():
                      with open(master_file) as f:
                          master = json.load(f)
                      passed, errors = validate_assembly(master)
                      print(f'{sku_dir.name}: {\"PASS\" if passed else \"FAIL\"}')
                      if errors:
                          for e in errors:
                              print(f'  - {e}')
          print('All validations complete')
          "

  sample-run:
    name: Sample Pipeline Run
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Run sample pipeline
        run: python main.py sample
      - name: Archive output
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-output
          path: pipeline/output/
          retention-days: 7

  live-pipeline:
    name: Live Pipeline (API Key Required)
    needs: test
    if: github.event.inputs.live == 'true'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Run pipeline
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: |
          if [ -n "${{ github.event.inputs.sku_id }}" ]; then
            python main.py run --sku "${{ github.event.inputs.sku_id }}" --live
          else
            python main.py run --live
          fi
      - name: Archive output
        uses: actions/upload-artifact@v4
        with:
          name: live-pipeline-output
          path: pipeline/output/
          retention-days: 30
